name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Test
        run: yarn test

      - name: Coverage
        run: yarn run coverage

      # TODO: Enable Codecov once CODECOV_TOKEN secret is configured
      # - name: Upload coverage to Codecov
